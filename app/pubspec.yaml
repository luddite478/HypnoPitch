description: HypnoPitch — pattern sequencer and audio app.
environment:
  sdk: '>=3.4.4 <4.0.0'
version: 1.0.1+6
flutter:
  assets:
    - samples/acoustic/
    - samples/drums/
    - samples/drums/natural/
    - samples/drums/natural/Kick/
    - samples/drums/natural/Plates/
    - samples/drums/natural/Plates/China/
    - samples/drums/natural/Plates/Crash/
    - samples/drums/natural/Plates/Hi Hat/
    - samples/drums/natural/Plates/Ride Cymbal/
    - samples/drums/natural/Plates/Splash/
    - samples/drums/natural/Snare/
    - samples/drums/natural/Toms/
    - samples/noise/
    - samples/noise/click/
    - samples/noise/other/
    - samples/synth/
    - samples/synth/Bass/
    - samples/synth/Lead/
    - .env
    - icons/
    - samples_manifest.json
  uses-material-design: true
dependencies:
  provider: ^6.1.1
  flutter_svg: ^2.0.9
  flutter:
    sdk: flutter
  file_picker: ^8.0.7
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0
  flutter_dotenv: ^5.1.0
  docman: ^1.2.0
  path_provider: ^2.1.1
  ffi: ^2.1.0
  path: ^1.9.0
  share_plus: ^7.2.2
  shared_preferences: ^2.2.2
  just_audio: ^0.9.36
  crypto: ^3.0.5
  wheel_chooser: ^1.1.2
  uuid: ^4.5.1
  permission_handler: ^11.3.1
name: hypnopitch
publish_to: none
dev_dependencies:
  flutter_test:
    sdk: flutter
  ffigen: ^13.0.0
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "icons/white_mane1_cut_2.png"
  remove_alpha_ios: true
